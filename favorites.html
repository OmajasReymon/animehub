<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Favorites</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="CSS/favorites.css">
</head>

<body>

<div class="container">

<div class="header">
<i class="fa-solid fa-heart"></i>
<h1>My Favorites</h1>
</div>

<p class="subtitle">Your collection of favorite anime series</p>

<div class="topbar">
<p id="count"></p>
<button class="sort-btn">Sort by: Recently Added</button>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- EMPTY STATE -->
<div class="empty" id="empty" style="display:none;">
<i class="fa-regular fa-heart"></i>
<h2>No favorites yet</h2>
<p>Start adding anime to your favorites to see them here!</p>
<button class="browse" onclick="goBrowse()">Browse Anime</button>
</div>

</div>

<!-- JS -->
<script src="JS/favorites.js"></script>

</body>
</html>
